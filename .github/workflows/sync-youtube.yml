name: YouTube Data Sync

on:
  schedule:
    # 毎月1日 02:00 UTC（日本時間だと概ね午前11時）
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps (scripts)
        run: npm ci
        working-directory: scripts

      - name: Run sync
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node sync.js
        working-directory: scripts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos.json data/lastSync.json || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: sync youtube videos"
            git push
          fi
